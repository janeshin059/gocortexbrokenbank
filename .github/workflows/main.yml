#
# Build and Push Container Image to Docker Hub
# Triggers on version tag pushes (e.g., v1.3.6)
# Image tags: full version (1.3.6) and latest only
# Multi-architecture: linux/amd64 and linux/arm64 (Apple Silicon)
# Requires DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets in repository settings

name: Build and Push to Docker Hub
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: janeshin059/brokenbank-jashin
  CORTEX_API_KEY: ${{secrets.CORTEX_API_KEY}}
  CORTEX_API_KEY_ID: ${{secrets.CORTEX_API_KEY_ID}}
  CORTEX_API_URL: https://api-japac-ccr.xdr.jp.paloaltonetworks.com
  AWS_REGION: ap-northeast-2
  EKS_CLUSTER_NAME: pcs-yn-eks-jashin



jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-architecture builds
        uses: docker/setup-qemu-action@v3

      - name: Download cortexcli
        run: |
          set -x
          # crtx_resp=$(curl "${CORTEX_API_URL}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
          #   -H "x-xdr-auth-id: ${CORTEX_API_KEY_ID}" \
          #   -H "Authorization: ${CORTEX_API_KEY}")
          crtx_resp=$(curl -s "https://api-japac-ccr.xdr.jp.paloaltonetworks.com/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" -H "x-xdr-auth-id: ${CORTEX_API_KEY_ID}" -H "Authorization: ${CORTEX_API_KEY}") && crtx_url=$(echo $crtx_resp | jq -r ".signed_url") && crtx_file=$(echo $crtx_resp | jq -r ".file_name") && curl -o $crtx_file $crtx_url 
          crtx_url=$(echo $crtx_resp | jq -r ".signed_url")
          curl -o cortexcli $crtx_url
          chmod +x cortexcli
          ./cortexcli --version
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=true
      - name: Build and Load to Local Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true 
          tags: ${{ steps.meta.outputs.tags }}

      - name: Save Docker image to tar
        run: |
            docker save -o image.tar ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      - name: Run Cortex CLI Image Scan
        run: |
          sudo -E ./cortexcli --log-level debug --api-base-url "${CORTEX_API_URL}" --api-key "${CORTEX_API_KEY}" --api-key-id "${CORTEX_API_KEY_ID}" image scan --timeout 600 --archive image.tar
      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true   
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: broken-bank
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: broken-bank
            template:
              metadata:
                labels:
                  app: broken-bank
              spec:
                containers:
                - name: broken-bank
                  image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                  imagePullPolicy: Always
                  ports:
                  - containerPort: 8080
                  - containerPort: 8888
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: broken-bank-service
          spec:
            type: LoadBalancer
            selector:
              app: broken-bank
            ports:
              - name: tomcat
                protocol: TCP
                port: 80
                targetPort: 8080
              - name: flask
                protocol: TCP
                port: 8888
                targetPort: 8888
          EOF